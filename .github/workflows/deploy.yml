name: Deploy to Vercel
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Verify header/footer sync (build.py --check)
        run: python3 build.py --check
      - name: Verify all asset references resolve
        run: python3 scripts/check_links.py
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
    env:
      VERCEL_ORG_ID: team_sPQaPdEOVQaR42djHV2cTm51
      VERCEL_PROJECT_ID: prj_JKvED0gkEFd1PEHj2jGhX5Yiro9O
